# TicketFlow yerel altyapı — PostgreSQL, Redis (parolalı), Kafka KRaft (Bitnami legacy imaj, SASL/PLAIN).
# Not: docker.io/bitnami/kafka etiketleri Hub'dan kalktı; yerine bitnamilegacy/kafka sabit tag.
# İlk kurulum: cp .env.example .env — tüm sırlar tek dosyada (POSTGRES, REDIS, Kafka SASL, vb.).
# Redis parolası: .env içinde REDIS_PASSWORD (Compose komut satırında kullanılır).
#
# Apache Kafka imajından geçiş: eski volume uyumsuz → bir kez:
#   docker compose down -v && docker compose up -d

name: ticketflow

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env içinde tanımlı olmalı}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-ticketflow-databases.sql

  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD .env içinde tanımlı olmalı}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  kafka:
    image: docker.io/bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: ticketflow-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_CLIENT_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CLIENT_USERS: ${KAFKA_CLIENT_USERS:?KAFKA_CLIENT_USERS .env içinde tanımlı olmalı}
      KAFKA_CLIENT_PASSWORDS: ${KAFKA_CLIENT_PASSWORDS:?KAFKA_CLIENT_PASSWORDS .env içinde tanımlı olmalı}
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/bitnami

  seq:
    image: datalust/seq:latest
    container_name: ticketflow-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:-ticketflow-seq-dev-change-me}
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ticketflow-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC (OpenTelemetry verileri buraya akar)

  identity-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Identity/Identity.Api/Dockerfile
    container_name: identity-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Identity=Host=postgres;Port=5432;Database=ticketflow_identity;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SaslUsername=${KAFKA_CLIENT_USERS}
      - Kafka__SaslPassword=${KAFKA_CLIENT_PASSWORDS}
      - Seq__ServerUrl=http://seq:80
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - seq
      - jaeger

  catalog-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Catalog/Catalog.Api/Dockerfile
    container_name: catalog-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Catalog=Host=postgres;Port=5432;Database=ticketflow_catalog;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SaslUsername=${KAFKA_CLIENT_USERS}
      - Kafka__SaslPassword=${KAFKA_CLIENT_PASSWORDS}
      - Seq__ServerUrl=http://seq:80
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - kafka
      - seq
      - jaeger

  booking-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Booking/Booking.Api/Dockerfile
    container_name: booking-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Booking=Host=postgres;Port=5432;Database=ticketflow_booking;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__SaslUsername=${KAFKA_CLIENT_USERS}
      - Kafka__SaslPassword=${KAFKA_CLIENT_PASSWORDS}
      - CatalogService__BaseAddress=http://catalog-service:8080
      - Seq__ServerUrl=http://seq:80
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - kafka
      - seq
      - jaeger

  gateway:
    build:
      context: ../../backend/src
      dockerfile: Gateway/TicketFlow.Gateway/Dockerfile
    container_name: ticketflow-gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identity-service:8080
      - ReverseProxy__Clusters__catalog-cluster__Destinations__destination1__Address=http://catalog-service:8080
      - ReverseProxy__Clusters__booking-cluster__Destinations__destination1__Address=http://booking-service:8080
      - Seq__ServerUrl=http://seq:80
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - identity-service
      - catalog-service
      - booking-service
      - seq
      - jaeger

  simulation-worker:
    build:
      context: ../../backend/src
      dockerfile: Services/SimulationWorker/Dockerfile
    container_name: simulation-worker
    environment:
      - ApiGateway__BaseAddress=http://gateway:8080
      - Simulation__InitialDelaySeconds=5
      - Simulation__CycleDelaySeconds=20
      - Simulation__MaxCycles=1
      - Simulation__EnableAdminScenario=true
      - Simulation__EnableBookingScenario=true
      - Simulation__EnableRaceScenario=true
      - Simulation__EnableLoadScenario=false
      - Simulation__NegativeScenarioRepeatCount=3
      - Simulation__LoadUsers=80
      - Simulation__LoadBatchSize=10
      - Simulation__LoadParallelism=5
      - Simulation__LoadBatchPauseSeconds=3
      - Simulation__LoadRegisterRetryCount=3
    depends_on:
      - gateway


volumes:
  postgres_data:
  redis_data:
  kafka_data:
  seq_data:
