
name: ticketflow

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-ticketflow-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: docker.io/bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: ticketflow-kafka
    hostname: kafka
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_CLIENT_USERS: ${KAFKA_CLIENT_USERS}
      KAFKA_CLIENT_PASSWORDS: ${KAFKA_CLIENT_PASSWORDS}
      KAFKA_CLIENT_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/9092'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  kafka-topic-init:
    image: docker.io/bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: ticketflow-kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - |
        cat >/tmp/client.properties <<EOF
        security.protocol=SASL_PLAINTEXT
        sasl.mechanism=PLAIN
        sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_CLIENT_USERS}" password="${KAFKA_CLIENT_PASSWORDS}";
        EOF
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --command-config /tmp/client.properties --create --if-not-exists --topic EventCancelledIntegrationEvent --partitions 1 --replication-factor 1
    restart: "no"

  seq:
    image: datalust/seq:latest
    container_name: ticketflow-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ticketflow-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  identity-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Identity/Identity.Api/Dockerfile
    container_name: identity-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Identity: Host=postgres;Port=5432;Database=ticketflow_identity;Username=postgres;Password=${POSTGRES_PASSWORD}
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      Kafka__BootstrapServers: kafka:9092
      Kafka__SaslUsername: ${KAFKA_CLIENT_USERS}
      Kafka__SaslPassword: ${KAFKA_CLIENT_PASSWORDS}
      Redis__LoginRequestsPerMinute: "1000000"
      Redis__RegisterRequestsPerMinute: "1000000"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      Otlp__Endpoint: http://jaeger:4317
      Seq__ServerUrl: http://seq:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  catalog-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Catalog/Catalog.Api/Dockerfile
    container_name: catalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Catalog: Host=postgres;Port=5432;Database=ticketflow_catalog;Username=postgres;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      Kafka__BootstrapServers: kafka:9092
      Kafka__SaslUsername: ${KAFKA_CLIENT_USERS}
      Kafka__SaslPassword: ${KAFKA_CLIENT_PASSWORDS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      Otlp__Endpoint: http://jaeger:4317
      Seq__ServerUrl: http://seq:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  booking-service:
    build:
      context: ../../backend/src
      dockerfile: Services/Booking/Booking.Api/Dockerfile
    container_name: booking-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Booking: Host=postgres;Port=5432;Database=ticketflow_booking;Username=postgres;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD},abortConnect=false
      CatalogService__BaseAddress: http://catalog-service:8080
      Kafka__BootstrapServers: kafka:9092
      Kafka__SaslUsername: ${KAFKA_CLIENT_USERS}
      Kafka__SaslPassword: ${KAFKA_CLIENT_PASSWORDS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      Otlp__Endpoint: http://jaeger:4317
      Seq__ServerUrl: http://seq:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-topic-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  gateway:
    build:
      context: ../../backend/src
      dockerfile: Gateway/TicketFlow.Gateway/Dockerfile
    container_name: ticketflow-gateway
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      Otlp__Endpoint: http://jaeger:4317
      Seq__ServerUrl: http://seq:80
      RateLimiting__PermitLimit: "1000000"
      RateLimiting__QueueLimit: "100000"
      RateLimiting__FixedWindowSeconds: "10"
      ReverseProxy__Clusters__booking-cluster__Destinations__destination1__Address: http://booking-service:8080
      ReverseProxy__Clusters__catalog-cluster__Destinations__destination1__Address: http://catalog-service:8080
      ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address: http://identity-service:8080
    depends_on:
      booking-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  simulation-worker:
    build:
      context: ../../backend/src
      dockerfile: Services/SimulationWorker/Dockerfile
    container_name: simulation-worker
    environment:
      ApiGateway__BaseAddress: http://gateway:8080
      Simulation__EnableAdminScenario: "true"
      Simulation__EnableBookingScenario: "true"
      Simulation__EnableRaceScenario: "true"
      Simulation__EnableLoadScenario: "true"
      Simulation__LoadUsers: "80"
      Simulation__LoadBatchSize: "10"
      Simulation__LoadParallelism: "5"
      Simulation__LoadBatchPauseSeconds: "1"
      Simulation__LoadRegisterRetryCount: "5"
    depends_on:
      gateway:
        condition: service_healthy

networks:
  default:
    name: ticketflow_default

volumes:
  kafka_data:
  postgres_data:
  redis_data:
  seq_data:
