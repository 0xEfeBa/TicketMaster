# Overlay: restart policies. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires .env (same as base compose).

name: ticketflow

services:
  postgres:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  kafka:
    restart: unless-stopped
  seq:
    restart: unless-stopped
  jaeger:
    restart: unless-stopped
  identity-service:
    restart: unless-stopped
  catalog-service:
    restart: unless-stopped
  booking-service:
    restart: unless-stopped
  gateway:
    restart: unless-stopped
  simulation-worker:
    restart: unless-stopped
